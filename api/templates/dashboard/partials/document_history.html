<div class="divide-y divide-gray-200 dark:divide-gray-800">
    {% for analysis in recent_analyses %}
    <div class="px-6 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-2">
        <div>
            <p class="text-sm font-medium text-gray-900 dark:text-gray-100">{{ analysis.file_name }}</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">{{ analysis.get_verdict_display }} • ELA {{ analysis.ela_score|default:'0.0' }} • {{ analysis.created_at|timesince }} ago</p>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[11px] px-2 py-0.5 rounded-full border {% if analysis.verdict == 'forged' %}border-red-500 text-red-500{% elif analysis.verdict == 'suspicious' %}border-amber-500 text-amber-500{% else %}border-emerald-500 text-emerald-500{% endif %}">
                {{ analysis.get_verdict_display }}
            </span>
            <button
                class="text-xs text-primary-600 dark:text-primary-400 hover:underline"
                hx-get="{% url 'dashboard:documents' %}?id={{ analysis.id }}"
                hx-target="#document-result"
                hx-swap="innerHTML"
            >View</button>
        </div>
    </div>
    {% empty %}
    <div class="px-6 py-6 text-center text-sm text-gray-500 dark:text-gray-400">No analyses yet.</div>
    {% endfor %}
</div>

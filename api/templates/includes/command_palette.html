<div
    id="commandPaletteModal"
    class="hidden fixed inset-0 z-50 overflow-y-auto"
    x-data="commandPaletteData()"
    x-init="init()"
    @keydown.escape.window="setCommandPaletteOpen(false)"
    x-show="!$el.classList.contains('hidden')"
    x-cloak
    @keydown.arrow-down.prevent="moveDown()"
    @keydown.arrow-up.prevent="moveUp()"
    @keydown.enter.prevent="goToSelected()"
>
    <div
        class="fixed inset-0 bg-black/50 backdrop-blur-sm transition-opacity"
        onclick="setCommandPaletteOpen(false)"
    ></div>

    <div class="flex min-h-full items-center justify-center p-4">
        <div
            class="relative w-full max-w-2xl transform overflow-hidden rounded-xl bg-white dark:bg-gray-800 shadow-2xl transition-all"
        >
            <div class="border-b border-gray-200 dark:border-gray-700 p-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input
                        type="text"
                        class="block w-full pl-10 pr-3 py-3 border-0 bg-transparent text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-0 text-base"
                        placeholder="Jump to any module…"
                        x-model="search"
                        x-ref="search"
                        @keydown.enter.prevent="goToSelected()"
                        autofocus
                    >
                </div>
            </div>

            <div class="max-h-96 overflow-y-auto scrollbar-thin">
                <template x-for="(command, index) in filteredCommands" :key="command.url">
                    <a
                        :href="command.url"
                        class="flex items-center gap-3 px-4 py-3 transition-colors cursor-pointer"
                        :class="index === selectedIndex ? 'bg-primary-50 dark:bg-primary-900/20 text-primary-700 dark:text-primary-400' : 'text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700/50'"
                        @mouseenter="selectedIndex = index"
                        hx-boost="true"
                        hx-target="#main-content"
                        hx-select="#main-content"
                        hx-swap="outerHTML"
                        onclick="setCommandPaletteOpen(false)"
                    >
                        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :d="command.icon"></path>
                        </svg>
                        <span x-text="command.name" class="font-medium"></span>
                    </a>
                </template>
                <div x-show="filteredCommands.length === 0" class="flex flex-col items-center justify-center py-12 text-gray-500 dark:text-gray-400">
                    <svg class="w-12 h-12 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <div class="text-sm">No commands found</div>
                </div>
            </div>
        </div>
    </div>
</div>
